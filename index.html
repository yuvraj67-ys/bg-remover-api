<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX.2 Pro - AI Image Generator</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; }
        .container { max-width: 400px; background: white; padding: 20px; border-radius: 10px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        textarea, button { width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; border-radius: 5px; }
        textarea { height: 100px; border: 1px solid #ccc; resize: none; }
        button { background-color: #000; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #333; }
        #status { font-weight: bold; margin-top: 10px; }
        #resultImage { max-width: 100%; margin-top: 15px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>✨ FLUX.2 Pro AI</h2>
        <p style="font-size: 14px; color: gray;">Describe the image you want to create</p>
        
        <textarea id="promptInput" placeholder="Eg: Glossy candy-colored 3D letters in hot pink on a sun-drenched poolside..."></textarea>
        
        <button id="generateBtn" onclick="generateImage()">Generate Image 🚀</button>
        
        <p id="status"></p>
        <img id="resultImage" />
    </div>

    <script>
        async function generateImage() {
            const promptText = document.getElementById('promptInput').value;
            const statusText = document.getElementById('status');
            const resultImg = document.getElementById('resultImage');
            const generateBtn = document.getElementById('generateBtn');

            if (!promptText) {
                alert("Bhai, pehle Prompt daalo!");
                return;
            }

            statusText.innerText = "⏳ FLUX.2 Pro AI soch raha hai... Please wait!";
            statusText.style.color = "blue";
            generateBtn.disabled = true;
            resultImg.style.display = "none";

            try {
                // Yahan aapka Vercel API link laga hua hai 👇
                const response = await fetch('https://ai-image-api-mu.vercel.app/api/edit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptText })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    statusText.innerText = "Image Generated ✅";
                    statusText.style.color = "green";
                    resultImg.src = data.edited_image_url;
                    resultImg.style.display = "block";
                } else {
                    throw new Error(data.error || "API Error");
                }

            } catch (error) {
                console.error("API Error:", error);
                // Agar Payment ka error aaya toh wo yahan dikhega
                statusText.innerText = "❌ Error: " + error.message;
                statusText.style.color = "red";
            } finally {
                generateBtn.disabled = false;
            }
        }
    </script>

</body>
</html>
