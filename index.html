<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Editor - Imgaura</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            margin: auto;
        }
        input[type="file"], input[type="text"], button {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        #status {
            font-weight: bold;
            color: #333;
            margin-top: 10px;
        }
        #resultImage {
            max-width: 100%;
            margin-top: 15px;
            border-radius: 10px;
            display: none; /* Initially hidden */
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎨 AI Photo Editor</h2>
        
        <label style="text-align: left; display: block; font-size: 14px;">1. Select Photo:</label>
        <input type="file" id="imageInput" accept="image/*" />

        <label style="text-align: left; display: block; font-size: 14px; margin-top: 10px;">2. AI Prompt (e.g., make it snow, change background to red):</label>
        <input type="text" id="promptInput" placeholder="Prompt sa ai edit kera..." />

        <button id="editBtn" onclick="editImage()">Image Edit ✅</button>

        <p id="status"></p>
        <img id="resultImage" alt="Edited Image Will Appear Here" />
    </div>

    <script>
        async function editImage() {
            const fileInput = document.getElementById('imageInput').files[0];
            const promptText = document.getElementById('promptInput').value;
            const statusText = document.getElementById('status');
            const resultImg = document.getElementById('resultImage');
            const editBtn = document.getElementById('editBtn');

            if (!fileInput || !promptText) {
                alert("Bhai, pehle Image aur Prompt dono daalo!");
                return;
            }

            // UI updating
            statusText.innerText = "⏳ AI Editing in progress... Please wait 10-15 seconds.";
            statusText.style.color = "blue";
            editBtn.disabled = true;
            resultImg.style.display = "none";

            // Image ko Base64 mein convert karna
            const reader = new FileReader();
            reader.readAsDataURL(fileInput);
            
            reader.onload = async function () {
                const base64Image = reader.result;

                try {
                    // Yahan aapka Vercel API link laga hua hai 👇
                    const response = await fetch('https://ai-image-api-mu.vercel.app/api/edit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            image: base64Image,
                            prompt: promptText
                        })
                    });

                    const data = await response.json();

                    if (data.success) {
                        statusText.innerText = "Image Edited ✅";
                        statusText.style.color = "green";
                        
                        // Show output image
                        resultImg.src = data.edited_image_url;
                        resultImg.style.display = "block";
                    } else {
                        statusText.innerText = "❌ Error: " + data.error;
                        statusText.style.color = "red";
                    }
                } catch (error) {
                    statusText.innerText = "❌ Server se connect nahi ho paya!";
                    statusText.style.color = "red";
                } finally {
                    editBtn.disabled = false;
                }
            };
        }
    </script>

</body>
</html>
