<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Editor - Test</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; }
        .container { max-width: 400px; background: white; padding: 20px; border-radius: 10px; margin: auto; }
        input, button { width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; font-weight: bold; }
        #status { font-weight: bold; margin-top: 10px; word-wrap: break-word; }
        #resultImage { max-width: 100%; margin-top: 15px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎨 AI Editor (Debug Mode)</h2>
        <input type="file" id="imageInput" accept="image/*" />
        <input type="text" id="promptInput" placeholder="Prompt: Make it snow" />
        <button id="editBtn" onclick="editImage()">Edit Image ✅</button>
        <p id="status"></p>
        <img id="resultImage" />
    </div>

    <script>
        async function editImage() {
            const fileInput = document.getElementById('imageInput').files[0];
            const promptText = document.getElementById('promptInput').value;
            const statusText = document.getElementById('status');
            const resultImg = document.getElementById('resultImage');
            const editBtn = document.getElementById('editBtn');

            if (!fileInput || !promptText) {
                alert("Image aur Prompt dono daalo!");
                return;
            }

            // Image size check (Max 2MB for testing)
            if (fileInput.size > 2 * 1024 * 1024) {
                statusText.innerText = "❌ Error: Photo ka size 2MB se bada hai. Choti photo use karein!";
                statusText.style.color = "red";
                return;
            }

            statusText.innerText = "⏳ Request Bheji Jaa Rahi Hai... Please wait!";
            statusText.style.color = "blue";
            editBtn.disabled = true;
            resultImg.style.display = "none";

            const reader = new FileReader();
            reader.readAsDataURL(fileInput);
            
            reader.onload = async function () {
                const base64Image = reader.result;

                try {
                    const response = await fetch('https://ai-image-api-mu.vercel.app/api/edit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: base64Image, prompt: promptText })
                    });

                    // Check for Vercel Timeouts or Size limits
                    if (response.status === 504) {
                        throw new Error("Vercel Timeout (10 seconds limits par ho gayi). AI slow hai.");
                    }
                    if (response.status === 413) {
                        throw new Error("Payload Too Large. Photo ka size Vercel limit se bada hai.");
                    }

                    const data = await response.json();

                    if (response.ok && data.success) {
                        statusText.innerText = "Image Edited ✅";
                        statusText.style.color = "green";
                        resultImg.src = data.edited_image_url;
                        resultImg.style.display = "block";
                    } else {
                        throw new Error(data.error || "Unknown API Error");
                    }

                } catch (error) {
                    console.error("API Error:", error);
                    statusText.innerText = "❌ Error aaya: " + error.message;
                    statusText.style.color = "red";
                } finally {
                    editBtn.disabled = false;
                }
            };
        }
    </script>

</body>
</html>
