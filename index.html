<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imgaura Studio - AI Tools</title>
    <!-- Addy Osmani's recommended Frontend AI Library -->
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/browser.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; text-align: center; padding: 20px; }
        .container { max-width: 500px; background: white; padding: 30px; border-radius: 12px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 20px; }
        label { text-align: left; display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        select, input[type="file"], button { width: 100%; margin-bottom: 20px; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { background-color: #2563eb; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #93c5fd; cursor: not-allowed; }
        #status { font-weight: bold; margin-top: 10px; font-size: 15px; }
        #resultImage { max-width: 100%; margin-top: 20px; border-radius: 10px; display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="container">
        <h2>🛠️ Imgaura Studio</h2>
        
        <label>1. Select Tool:</label>
        <select id="toolSelector">
            <!-- Yeh ab Browser mein bina server ke chalega -->
            <option value="frontend-bg-remove">✂️ AI Background Remover (Free/Local)</option>
            <!-- Yeh teeno Render server par jayenge -->
            <option value="/api/compress">🗜️ Image Compressor</option>
            <option value="/api/filter?type=grayscale">🖤 Black & White Filter</option>
            <option value="/api/filter?type=blur">🌫️ Blur Image</option>
        </select>

        <label>2. Upload Photo:</label>
        <input type="file" id="imageInput" accept="image/*" />

        <button id="processBtn" onclick="processImage()">Process Image 🚀</button>

        <p id="status"></p>
        <img id="resultImage" alt="Output Image Will Appear Here" />
    </div>

    <script>
        async function processImage() {
            const fileInput = document.getElementById('imageInput').files[0];
            let apiEndpoint = document.getElementById('toolSelector').value;
            const statusText = document.getElementById('status');
            const resultImg = document.getElementById('resultImage');
            const processBtn = document.getElementById('processBtn');

            if (!fileInput) {
                alert("Bhai, pehle photo toh upload karo!");
                return;
            }

            processBtn.disabled = true;
            processBtn.innerText = "Processing...";
            resultImg.style.display = "none";
            statusText.style.color = "#2563eb";

            // -----------------------------------------------------------------
            // ADDY OSMANI'S FIX: AI Background Remover In-Browser
            // -----------------------------------------------------------------
            if (apiEndpoint === "frontend-bg-remove") {
                statusText.innerText = "⏳ AI loading in browser... (Bina server ke background hat raha hai, thoda wait karein)";
                
                try {
                    // MAIN FIX: Model assets ka direct CDN path dena zaroori hai
                    const config = {
                        publicPath: "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/"
                    };

                    // Process image locally using user's device power
                    const imageBlob = fileInput;
                    const bgRemovedBlob = await imglyRemoveBackground(imageBlob, config);
                    
                    // Create URL to show image
                    const url = URL.createObjectURL(bgRemovedBlob);
                    
                    statusText.innerText = "Done! Background Removed ✅";
                    statusText.style.color = "green";
                    resultImg.src = url;
                    resultImg.style.display = "block";
                } catch (error) {
                    console.error("BG Remove Error:", error);
                    statusText.innerText = "❌ Error: AI Model browser mein load nahi ho paya. Apna internet connection check karein.";
                    statusText.style.color = "red";
                } finally {
                    processBtn.disabled = false;
                    processBtn.innerText = "Process Image 🚀";
                }
                return; 
            }

            // -----------------------------------------------------------------
            // RENDER API: For Compressor & Filters
            // -----------------------------------------------------------------
            statusText.innerText = "⏳ Server par processing ho rahi hai... Please wait!";
            const formData = new FormData();
            formData.append('image', fileInput);

            if (apiEndpoint.includes('?type=')) {
                const type = apiEndpoint.split('=')[1];
                formData.append('filterType', type);
                apiEndpoint = '/api/filter';
            }

            try {
                // Aapka working Render Server
                const serverUrl = 'https://edit-img.onrender.com' + apiEndpoint;
                const response = await fetch(serverUrl, { method: 'POST', body: formData });
                const data = await response.json();

                if (response.ok && data.success) {
                    statusText.innerText = "Done! Image Processed ✅";
                    statusText.style.color = "green";
                    resultImg.src = data.result_image;
                    resultImg.style.display = "block";
                } else {
                    throw new Error(data.error || "Server processing failed");
                }
            } catch (error) {
                console.error(error);
                statusText.innerText = "❌ Error: " + error.message;
                statusText.style.color = "red";
            } finally {
                processBtn.disabled = false;
                processBtn.innerText = "Process Image 🚀";
            }
        }
    </script>

</body>
</html>
