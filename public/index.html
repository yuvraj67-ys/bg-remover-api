<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Background Remover API</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    #output { max-width: 100%; border: 1px solid #ddd; margin: 1rem 0; display: none; }
    #download { display: none; margin: 1rem 0; }
    #status { margin: 1rem 0; padding: 0.75rem; background: #f8f9fa; border-radius: 6px; border-left: 4px solid #007bff; }
    .error { border-left-color: #dc3545; background: #fff5f5; }
    .success { border-left-color: #28a745; background: #f0fff4; }
    button { padding: 0.6rem 1.2rem; margin: 0.25rem; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #progress { height: 8px; background: #e9ecef; border-radius: 4px; margin: 0.5rem 0; overflow: hidden; display: none; }
    #progress-bar { height: 100%; width: 0%; background: #007bff; transition: width 0.2s; }
  </style>
</head>
<body>
  <h1>🎨 Background Remover API</h1>
  <p>Powered by Transformers.js + RMBG-1.4</p>
  
  <button id="loadModel">🚀 Load AI Model (~170MB)</button>
  <input type="file" id="upload" accept="image/*" disabled />
  
  <div id="status">Click "Load AI Model" to start</div>
  <div id="progress"><div id="progress-bar"></div></div>
  
  <canvas id="output"></canvas>
  <a id="download" download="no-bg.png"><button>⬇️ Download PNG</button></a>

  <script type="module">
    // ✅ Use correct import
    import { AutoModel, AutoProcessor, env, RawImage } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';

    // Critical config for browser loading
    env.allowLocalModels = false;
    env.useBrowserCache = true;
    env.backends.onnx.wasm.proxy = true;

    let model = null, processor = null;

    async function initModel() {
      const loadBtn = document.getElementById('loadModel');
      const status = document.getElementById('status');
      const progress = document.getElementById('progress');
      const progressBar = document.getElementById('progress-bar');
      
      loadBtn.disabled = true;      status.textContent = '⏳ Loading model...';
      progress.style.display = 'block';

      try {
        // ✅ Use AutoModel + AutoProcessor (NOT pipeline)
        // RMBG-1.4 has custom architecture - pipeline() doesn't support it [[50]]
        model = await AutoModel.from_pretrained('briaai/RMBG-1.4', {
          progress_callback: (data) => {
            if (data?.progress) {
              progressBar.style.width = `${data.progress}%`;
              status.textContent = `⏳ Loading: ${Math.round(data.progress)}%`;
            }
          }
        });

        processor = await AutoProcessor.from_pretrained('briaai/RMBG-1.4');
        
        progress.style.display = 'none';
        status.textContent = '✅ Model ready! Upload an image.';
        status.className = 'success';
        document.getElementById('upload').disabled = false;
        loadBtn.textContent = '✅ Model Loaded';
        
      } catch (err) {
        console.error('Model error:', err);
        progress.style.display = 'none';
        status.textContent = `❌ ${err.message || 'Load failed'}`;
        status.className = 'error';
        loadBtn.disabled = false;
      }
    }

    document.getElementById('loadModel').addEventListener('click', initModel);

    document.getElementById('upload').addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file || !model || !processor) return;

      const status = document.getElementById('status');
      status.textContent = '🔄 Processing...';

      try {
        // Load and preprocess image
        const image = await RawImage.fromURL(URL.createObjectURL(file));
        const inputs = await processor(image);

        // ✅ Run inference with proper output handling
        const { output } = await model(inputs);
        
        // Post-process: resize mask to original size + apply alpha        const mask = await RawImage.fromTensor(output[0].mul(255).to('uint8')).resize(image.width, image.height);
        
        // Create canvas result
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        canvas.width = image.width;
        canvas.height = image.height;
        canvas.style.display = 'block';

        // Draw original image
        ctx.drawImage(image.toCanvas(), 0, 0);
        
        // Apply alpha mask
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < mask.data.length; i++) {
          imageData.data[i * 4 + 3] = mask.data[i]; // Set alpha channel
        }
        ctx.putImageData(imageData, 0, 0);

        // Enable download
        const download = document.getElementById('download');
        download.href = canvas.toDataURL('image/png');
        download.style.display = 'inline-block';
        status.textContent = '✨ Done! Download ready.';
        status.className = 'success';

      } catch (err) {
        console.error('Process error:', err);
        status.textContent = `❌ ${err.message}`;
        status.className = 'error';
      }
    });
  </script>
</body>
</html>
