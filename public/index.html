<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Background Remover API</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
    #output { max-width: 100%; border: 1px solid #ddd; margin: 1rem 0; display: none; }
    #download { display: none; margin: 1rem 0; }
    #status { margin: 1rem 0; padding: 0.75rem; background: #f8f9fa; border-radius: 6px; border-left: 4px solid #007bff; white-space: pre-wrap; }
    .error { border-left-color: #dc3545; background: #fff5f5; }
    .success { border-left-color: #28a745; background: #f0fff4; }
    button { padding: 0.6rem 1.2rem; margin: 0.25rem; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #progress { height: 8px; background: #e9ecef; border-radius: 4px; margin: 0.5rem 0; overflow: hidden; display: none; }
    #progress-bar { height: 100%; width: 0%; background: #007bff; transition: width 0.2s; }
  </style>
</head>
<body>
  <h1>🎨 Background Remover API</h1>
  <p>Powered by Transformers.js + RMBG-1.4</p>
  
  <button id="loadModel">🚀 Load AI Model (~170MB)</button>
  <input type="file" id="upload" accept="image/*" disabled />
  
  <div id="status">Click "Load AI Model" to start</div>
  <div id="progress"><div id="progress-bar"></div></div>
  
  <canvas id="output"></canvas>
  <a id="download" download="no-bg.png"><button>⬇️ Download PNG</button></a>

  <!-- ✅ CRITICAL FIX: Load the app.js module -->
  <script type="module" src="/app.js"></script>
</body>
</html>
